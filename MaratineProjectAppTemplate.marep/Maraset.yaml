# --------------------------------------------------------------
# Maraset – manifest du package *.marep* pour Slura OS
# --------------------------------------------------------------

package:
  # Nom du package (identifiant unique, style reverse‑DNS)
  name: base***HelloWorld
  # Version du package (semver)
  version: 1.0.0
  # Build identifier (timestamp ou hash)
  build: 20240611-01

# --------------------------------------------------------------
# Métadonnées spécifiques à Slura / Maratine
# --------------------------------------------------------------
metadata:
  # Type de cible (AMD64, ARM64, …)
  target: amd64
  # Format du bundle
  bundle: marep
  # Attributs propres au runtime Slura
  attributes:
    SRID: SRID_helloworld_001               # identifiant de sécurité / registre
    Marav: 0.1 build 06260912-dev                            # version du framework Maratine utilisé
    description: |
      Application d’exemple « Hello World » écrite en Maratine.
      Utilise le kit MaratineKit, le rendu UI et le moteur graphique
      MaraGrphAPI.  Le package est destiné à Slura OS (AMD64).
    # Version minimale et maximale de Slura OS supportée
    slura_min: 1
    slura_max: 5.0

# --------------------------------------------------------------
# Dépendances (section **Basecon**) – format base***HelloWorld***
# --------------------------------------------------------------
dependencies:
  # Chaque dépendance utilise le séparateur *** et le préfixe base***HelloWorld***
  # Aucun point (.) n’est présent dans les clés.
  basecon:
    # Dépendance unique vers le module d'exemple LAPrevent
    base***example***LAPrevent: 1.0.0
    # Ajout de la dépendance vers le module OEntry
    base***example***OEntry: 1.0.0

# --------------------------------------------------------------
# Ressources supplémentaires (facultatif)
# --------------------------------------------------------------
resources:
  # Fichiers de configuration ou de données embarquées
  - path: RAbstractallowing.xml
    type: xml
    description: "Règles d’autorisation abstraites pour le sandbox Slura."

# --------------------------------------------------------------
# Scripts de post‑installation (optionnel)
# --------------------------------------------------------------
scripts:
  postinstall: |
    #!/usr/bin/env bash
    echo "Installation du package ${package.name} version ${package.version}"
    # Enregistrement du SRID dans le registre système Slura
    slura-reg add --srid ${metadata.attributes.SRID}